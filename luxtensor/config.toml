# ============================================================
# LOCAL DEVELOPMENT configuration — NOT for testnet/production.
# Testnet uses genesis.testnet.json (chain_id = 9999).
# Production uses config.production.toml.
# ============================================================

[node]
name = "luxtensor-node"
# Local dev chain_id (8898). Testnet chain_id is 9999 (see genesis.testnet.json).
chain_id = 8898
data_dir = "./data"
is_validator = true
# Set to true ONLY for local development. Never enable in production/testnet.
dev_mode = false

[consensus]
block_time = 3
epoch_length = 100
min_stake = "1000000000000000000"
# Local dev: 100 validators allowed. Testnet genesis overrides to 21.
# In production, the genesis value takes precedence over this config.
max_validators = 100

[network]
listen_addr = "0.0.0.0"
listen_port = 30303
bootstrap_nodes = []
max_peers = 50
enable_mdns = true

[storage]
db_path = "./data/db"
enable_compression = true
max_open_files = 1000
cache_size = 256

[rpc]
enabled = true
listen_addr = "127.0.0.1"
listen_port = 8545
ws_port = 8546
ws_enabled = true
threads = 4
# WARNING: Never use ["*"] in production — restricts cross-origin access.
# For production, list specific allowed origins.
cors_origins = ["http://localhost:3000", "http://localhost:8080"]

[logging]
level = "info"
log_to_file = false
json_format = false
